apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: workstation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service
          image: workstation/task-service:latest
          ports:
            - containerPort: 4002
          envFrom:
            - configMapRef:
                name: workstation-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: workstation-secrets
                  key: OPENAI_API_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: workstation-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: workstation
spec:
  selector:
    app: task-service
  ports:
    - protocol: TCP
      port: 4002
      targetPort: 4002
