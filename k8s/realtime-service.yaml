apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-service
  namespace: workstation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtime-service
  template:
    metadata:
      labels:
        app: realtime-service
    spec:
      containers:
        - name: realtime-service
          image: workstation/realtime-service:latest
          ports:
            - containerPort: 4004
          envFrom:
            - configMapRef:
                name: workstation-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: workstation-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-service
  namespace: workstation
spec:
  type: LoadBalancer
  selector:
    app: realtime-service
  ports:
    - protocol: TCP
      port: 4004
      targetPort: 4004
