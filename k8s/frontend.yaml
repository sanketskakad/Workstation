apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: workstation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: workstation/frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: workstation-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: workstation
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
