apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: workstation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: workstation/auth-service:latest
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: workstation-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: workstation-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: workstation
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 4001
      targetPort: 4001
